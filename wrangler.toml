name = "nexus-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets (frontend)
[assets]
directory = "src/static"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "nexus-db"
database_id = "5036aba9-abbf-4d13-8822-3e0147e257af"

# KV for sessions/cache
[[kv_namespaces]]
binding = "SESSIONS"
id = "248c560a31f54458bcc6ac1d1c517392"

# Durable Objects for real-time chat
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

# JWT Secret (set via: wrangler secret put JWT_SECRET)
